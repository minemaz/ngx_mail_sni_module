# Minimal example: one nginx mail proxy serving two domains' mail hosts,
# each with its own Let's Encrypt certificate selected by SNI — STARTTLS too.

load_module modules/ngx_mail_sni_module.so;

events {}

# auth_http endpoint (nginx mail proxy requires one; here it just returns a
# fixed backend — replace with your real auth/routing service).
http {
    server {
        listen 127.0.0.1:9000;
        location = /auth {
            add_header Auth-Status OK     always;
            add_header Auth-Server 10.0.0.10 always;   # your IMAP/POP3/SMTP backend
            add_header Auth-Port   143    always;
            return 200 "";
        }
    }
}

mail {
    server_name mail.a.example;
    auth_http   127.0.0.1:9000/auth;
    proxy_pass_error_message on;

    # per-SNI certificates live here as <servername>.crt / <servername>.key
    ssl_sni_certificates_path /etc/nginx/certs/sni;

    # fallback certificate for unknown / no-SNI clients
    ssl_certificate     /etc/nginx/certs/sni/mail.a.example.crt;
    ssl_certificate_key /etc/nginx/certs/sni/mail.a.example.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    server { listen 143 ssl; protocol imap; starttls on; }
    server { listen 993 ssl; protocol imap; }
    server { listen 110 ssl; protocol pop3; starttls on; }
    server { listen 995 ssl; protocol pop3; }
    server { listen 587 ssl; protocol smtp; starttls on; }
    server { listen 465 ssl; protocol smtp; }
}

# certs/sni/
#   mail.a.example.crt  mail.a.example.key
#   mail.b.example.crt  mail.b.example.key
# A client connecting to mail.b.example:143 (STARTTLS) is served
# mail.b.example's certificate; mail.a.example gets mail.a.example's.
